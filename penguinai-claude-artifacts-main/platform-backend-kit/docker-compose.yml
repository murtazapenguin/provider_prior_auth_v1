services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
      - rabbitmq
    volumes:
      - ./app:/home/appuser/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    deploy:
      resources:
        limits:
          memory: 512M

  celery_worker:
    build: .
    env_file: .env
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
    command: celery -A app.celery_app worker --loglevel=info
    deploy:
      resources:
        limits:
          memory: 512M

  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: platform_backend
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 256M

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  mongo_data:
